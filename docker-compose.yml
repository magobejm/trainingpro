services:
  postgres:
    image: postgres:16-alpine
    container_name: trainerpro-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trainerpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - trainerpro_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: trainerpro-api
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/trainerpro}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-8080}
    ports:
      - '8080:8080'

  prisma-studio:
    image: node:20-alpine
    container_name: trainerpro-prisma-studio
    working_dir: /workspace
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/trainerpro}
    ports:
      - '5555:5555'
    volumes:
      - ./:/workspace
    command:
      - sh
      - -lc
      - >
        npx prisma@6.19.2 studio --schema prisma/schema.prisma --hostname 0.0.0.0 --port 5555 --browser none

volumes:
  trainerpro_pgdata:
