services:
  api:
    profiles: ['deploy']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: trainerpro-api
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:54322/postgres?sslmode=disable}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-8080}
    ports:
      - '8080:8080'
